<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BTS X OREO</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>BTS X OREO</h1>
      <p>ENTER PASSWORD</p>

      <input type="password" id="passwordInput" placeholder="********">
      <button id="enterBtn">ENTER</button>

      <span id="errorText"></span>
    </div>
  </div>

  <!-- ESCENA -->
  <div class="scene hidden" id="mainScene">

    <div class="pack-container">

      <!-- IZQUIERDA -->
      <div class="pack left-pack"></div>

      <!-- INTERIOR VISUAL (solo decoración) -->
      <div class="inside"></div>

      <!-- GALLETITAS (FUERA DEL inside, FIX CLAVE) -->
      <div class="cookies" id="cookies">
        <img src="galletita1.png" class="cookie c1">
        <img src="galletita2.png" class="cookie c2">
        <img src="galletita3.png" class="cookie c3">
        <img src="galletita4.png" class="cookie c4">
        <img src="galletita5.png" class="cookie c5">
        <img src="galletita6.png" class="cookie c6">
        <img src="galletita7.png" class="cookie c7">
        <img src="galletita8.png" class="cookie c8">
      </div>

      <!-- DERECHA (ABERTURA) -->
      <div class="pack right-pack" id="rightPack"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
