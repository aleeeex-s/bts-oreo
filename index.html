<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BTS X OREO</title>
<link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>BTS X OREO</h1>
      <p>INGRESA LA CLAVE</p>

      <input type="password" id="passwordInput" placeholder="********">
      <button id="enterBtn">ENTRAR</button>

      <span id="errorText"></span>
    </div>
  </div>

  <!-- ESCENA -->
  <div class="scene hidden" id="mainScene">

    <div class="pack-container">

      <!-- IZQUIERDA -->
      <div class="pack left-pack"></div>

      <!-- INTERIOR VISUAL (solo decoración) -->
      <div class="inside"></div>

      <!-- GALLETITAS (FUERA DEL inside, FIX CLAVE) -->
      <div class="cookies" id="cookies">
<div class="cookie c1" data-img="galletita1.png"></div>
<div class="cookie c2" data-img="galletita2.png"></div>
<div class="cookie c3" data-img="galletita3.png"></div>
<div class="cookie c4" data-img="galletita4.png"></div>
<div class="cookie c5" data-img="galletita5.png"></div>
<div class="cookie c6" data-img="galletita6.png"></div>
<div class="cookie c7" data-img="galletita7.png"></div>
<div class="cookie c8" data-img="galletita8.png"></div>
      </div>

      <!-- DERECHA (ABERTURA) -->
      <div class="pack right-pack" id="rightPack"></div>

    </div>

  </div>

<audio id="bgMusic" loop>
  <source src="oreo-music.mp3" type="audio/mpeg">
</audio>
  
  <script src="script.js"></script>

</body>
</html>
