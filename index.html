<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BTS Oreo Experience</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->

  <div class="login-screen" id="loginScreen">

    <div class="login-box">

      <h1>BTS OREO</h1>

      <p>ENTER PASSWORD</p>

      <input
        type="password"
        id="passwordInput"
        placeholder="********"
      >

      <button id="enterBtn">
        ENTER
      </button>

      <span id="errorText"></span>

    </div>

  </div>

  <!-- ESCENA -->

  <div class="scene hidden" id="mainScene">

    <div class="pack-container">

      <!-- IZQUIERDA -->
      <div class="pack left-pack"></div>

      <!-- INTERIOR -->
      <div class="inside"></div>

      <!-- DERECHA -->
      <div class="pack right-pack" id="rightPack"></div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
